pr:
- main
- dev
- release/*

pool:
  vmImage: ubuntu-latest

strategy:
  matrix:
    Go_1_26:
      GO_VERSION: '1.26'

steps:
- task: GoTool@0
  inputs:
    version: '$(GO_VERSION)'
  displayName: 'Install Go $(GO_VERSION)'

- script: go build ./...
  displayName: 'Build'

- script: go vet ./...
  displayName: 'Vet'

- script: go test ./...
  displayName: 'Test'
