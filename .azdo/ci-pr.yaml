pr:
- main
- dev
- release/*

pool:
  vmImage: ubuntu-latest

strategy:
  matrix:
    Go_1_22:
      GO_VERSION: '1.22'
    Go_1_23:
      GO_VERSION: '1.23'
    Go_1_24:
      GO_VERSION: '1.24'

steps:
- task: GoTool@0
  inputs:
    version: '$(GO_VERSION)'
  displayName: 'Install Go $(GO_VERSION)'

- script: go build ./...
  displayName: 'Build'

- script: go vet ./...
  displayName: 'Vet'

- script: go test ./...
  displayName: 'Test'
